services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter
      POSTGRES_DB: arbiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbiter -d arbiter"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # arbiter:
  #   build: .
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: sh -c "alembic upgrade head && python -m arbiter.main"
  #   env_file: .env

volumes:
  postgres_data:
